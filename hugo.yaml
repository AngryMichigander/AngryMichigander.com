module:
  imports:
    - path: github.com/jpanther/lynx
title: The Angry Michigander
enableEmoji: true
disableKinds:
  - taxonomy
  - term
params:
  author:
    name: The Angry Michigander
    headline: Just a Michigander who has opinions
    image: author.png
    links:
      - link:
          href: '/network/'
          text: The AngryMichigander Network
          target: _self
      # Personal/social links can go here later — GitHub, Mastodon, etc.
      # - github: 'https://github.com/AngryMichigander'
      # - x: 'https://x.com/...'
markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
