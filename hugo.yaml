module:
  imports:
    - path: github.com/jpanther/lynx
title: The Angry Michigander
enableEmoji: true
disableKinds:
  - taxonomy
  - term
params:
  author:
    name: The Angry Michigander
    headline: Just a Michigander who has opinions
    image: author.png
    links:
      # Sister sites in the AngryMichigander Network (mirrors network.json order).
      - link:
          href: 'https://alligatorpelican.com'
          text: AlligatorPelican
          target: _blank
      - link:
          href: 'https://dinokent.com'
          text: DinoKent
          target: _blank
      - link:
          href: 'https://cheatingchelsea.com'
          text: CheatingChelsea
          target: _blank
      - link:
          href: 'https://onlyphiles.com'
          text: OnlyPhiles
          target: _blank
      - link:
          href: '/network/'
          text: About The AngryMichigander Network
          target: _self
      # Personal/social links can go here later — GitHub, Mastodon, etc.
      # - github: 'https://github.com/AngryMichigander'
      # - x: 'https://x.com/...'
markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
